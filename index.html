<style>

    --bg: #F5F5F5; --card-bg: #FFFFFF; --header-bg: #ECEFF1;
    --text: #212121; --text-sub: #757575; --border: #E0E0E0;
    --shadow: 0 2px 8px rgba(0,0,0,0.10);
    --radius: 12px;
    /* 대리점 색상 */
    --c-js: #1565C0; --c-seoguipo: #00838F; --c-smile: #558B2F;
    --c-anyu: #AD1457; --c-oreum: #4527A0; --c-jeju: #E65100;
    --c-jejuet: #00695C; --c-jejugwangyang: #1976D2; --c-jejugoodmorning: #F57F17;
    --c-jejujeongdaun: #6A1B9A; --c-jejujungang: #37474F;
  }
  html, body { height: 100%; font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  a { text-decoration: none; color: inherit; }

  /* ── HEADER ── */
  .dashboard-header {
    background: linear-gradient(135deg, #E60012 0%, #b0000d 100%);
    color: #fff; text-align: center; padding: 28px 20px 18px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 16px rgba(230,0,18,0.25);
  }
  .dashboard-header h1 { font-size: 40px; font-weight: 900; letter-spacing: -1px; text-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .dashboard-header .date-label { font-size: 10px; font-weight: 700; margin-top: 6px; opacity: 0.88; letter-spacing: 2px; }

  /* ── TOP CARDS ── */
  .top-cards-section { padding: 20px 16px 8px; }
  .top-cards-section h2 { font-size: 1rem; font-weight: 700; color: var(--text-sub); margin-bottom: 12px; letter-spacing: 1px; }
  .top-cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .top-card {
    background: var(--card-bg); border-radius: var(--radius);
    padding: 16px 18px 14px; box-shadow: var(--shadow);
    border-left: 5px solid #ccc; min-width: 160px; min-height: 100px;
    transition: transform .15s, box-shadow .15s; cursor: default;
    position: relative; overflow: hidden;
  }
  .top-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.14); }
  .top-card .agency-name { font-size: 0.72rem; font-weight: 700; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 4px; }
  .top-card .store-name { font-size: 1.15rem; font-weight: 900; line-height: 1.2; }
  .top-card .crown { font-size: 1.4rem; position: absolute; top: 12px; right: 14px; }
  .top-card .score { font-size: 1.1rem; font-weight: 400; margin-top: 6px; color: var(--text-sub); }
  .top-card .grade-badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: 6px; }

  /* ── TABS ── */
  .tabs-wrapper { position: sticky; top: 110px; z-index: 90; background: var(--bg); padding: 0 16px; border-bottom: 2px solid var(--border); }
  .tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0; padding: 12px 18px; font-size: 0.88rem; font-weight: 700;
    border: none; background: transparent; cursor: pointer; color: var(--text-sub);
    border-bottom: 3px solid transparent; transition: all .15s; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--primary); }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-btn .tab-count { display: inline-block; background: var(--border); color: var(--text-sub); font-size: 0.7rem; padding: 1px 6px; border-radius: 10px; margin-left: 4px; }
  .tab-btn.active .tab-count { background: var(--primary-light); color: #fff; }

  /* ── TABLE SECTION ── */
  .table-section { padding: 16px; overflow-x: auto; min-height: 300px; }
  .table-wrap { overflow-x: auto; overflow-y: auto; border-radius: var(--radius); box-shadow: var(--shadow); background: var(--card-bg); }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  thead tr { background: var(--header-bg) !important; position: sticky; top: 0; z-index: 10; }
  thead th {
    padding: 12px 14px; font-size: 0.82rem; font-weight: 700; color: var(--text-sub);
    text-align: center; border-bottom: 2px solid var(--border); white-space: nowrap;
    cursor: pointer; user-select: none;
  }
  thead th:hover { background: #DDE3E8 !important; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: #FAFAFA !important; }
  tbody td { padding: 10px 14px; font-size: 0.85rem; text-align: center; vertical-align: middle; }
  tbody td:first-child { text-align: left; font-weight: 700; }

  /* rank highlight */
  .rank-1 td:first-child { color: #E60012 !important; }
  .rank-2 td:first-child { color: #1565C0 !important; }
  .rank-3 td:first-child { color: #2E7D32 !important; }
  .rank-1 { background: #FFF8F8 !important; }
  .rank-2 { background: #F0F4FF !important; }
  .rank-3 { background: #F0FFF2 !important; }
  .rank-badge { display: inline-block; width: 22px; height: 22px; border-radius: 50%; font-size: 0.72rem; font-weight: 900; line-height: 22px; text-align: center; margin-right: 6px; }
  .rank-badge-1 { background: #E60012; color: #fff; }
  .rank-badge-2 { background: #1565C0; color: #fff; }
  .rank-badge-3 { background: #2E7D32; color: #fff; }
  .rank-badge-n { background: var(--border); color: var(--text-sub); }

  /* grade badge */
  .grade-1 { background: var(--grade1-bg); color: var(--grade1); border: 1px solid var(--grade1-border); padding: 3px 10px; border-radius: 20px; font-weight: 700; font-size: 0.78rem; white-space: nowrap; }
  .grade-2 { background: var(--grade2-bg); color: var(--grade2); border: 1px solid var(--grade2-border); padding: 3px 10px; border-radius: 20px; font-weight: 700; font-size: 0.78rem; white-space: nowrap; }
  .grade-3 { background: var(--grade3-bg); color: var(--grade3); border: 1px solid var(--grade3-border); padding: 3px 10px; border-radius: 20px; font-weight: 700; font-size: 0.78rem; white-space: nowrap; }

  /* level up badge */
  .level-y { background: var(--levelY-bg); color: var(--levelY); border: 1px solid var(--levelY-border); padding: 2px 8px; border-radius: 12px; font-size: 0.72rem; font-weight: 700; }
  .level-n { background: #ECEFF1; color: #607D8B; border: 1px solid #B0BEC5; padding: 2px 8px; border-radius: 12px; font-size: 0.72rem; font-weight: 700; }

  /* arrow */
  .arrow-up { color: #E60012; font-size: 1rem; }
  .arrow-down { color: #1565C0; font-size: 1rem; }
  .arrow-same { color: #9E9E9E; font-size: 1rem; }

  .score-cell { font-weight: 700; font-size: 0.95rem; }
  .score-high { color: #E60012; }
  .score-mid { color: #1565C0; }
  .score-low { color: #E65100; }

  .ai-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; border: none; border-radius: 8px; padding: 5px 12px;

    transition: opacity .15s, transform .1s;
  }
  .ai-btn:hover { opacity: 0.85; transform: scale(1.04); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 1000; align-items: center; justify-content: center;
  }

    content: attr(data-tooltip);

</style>

  "제주E&T":    { border:"#00695C", bg:"#E0F2F1", text:"#00695C" },
  "제주광양":   { border:"#1976D2", bg:"#E3F2FD", text:"#1976D2" },

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentTab = 'levelY';
let sortKey = 'score';
let sortAsc = false;

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function init() {
  renderTopCards();
  updateCounts();
  renderTable();
}

// ══════════════════════════════════════════════
//  TOP CARDS
// ══════════════════════════════════════════════
function renderTopCards() {
  const grid = document.getElementById('topCardsGrid');
  const agencies = [...new Set(RAW_DATA.map(d => d.agency))].sort();
  let html = '';
  agencies.forEach(agency => {
    const stores = RAW_DATA.filter(d => d.agency === agency);
    // 1등급 우선, 없으면 2등급
    let best = stores.filter(d => d.expectedGrade === 1).sort((a,b) => b.score - a.score)[0];
    if (!best) best = stores.filter(d => d.expectedGrade === 2).sort((a,b) => b.score - a.score)[0];
    if (!best) best = stores.sort((a,b) => b.score - a.score)[0];
    const col = AGENCY_COLORS[agency] || { border:"#9E9E9E", bg:"#F5F5F5", text:"#9E9E9E" };
    const gradeClass = `grade-${best.expectedGrade}`;
    const gradeLabel = `${best.expectedGrade}등급`;
    const levelBadge = best.levelUp === 'Y' ? '<span class="level-y">레벨업 Y</span>' : '';
    html += `
      <div class="top-card" style="border-left-color:${col.border};background:${col.bg};"
           data-tooltip="대리점: ${agency} | 최근3개월 종합: ${best.recent3Score.toFixed(2)} | 최근3개월 등급: ${best.recent3Grade}등급">
        <div class="agency-name" style="color:${col.text};">${agency}</div>
        <div class="store-name" style="color:${col.text};">${best.store} <span class="crown">👑</span></div>
        <div class="score" style="color:${col.text};">당월 종합점수: <strong>${best.score.toFixed(2)}</strong></div>
        <div style="margin-top:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <span class="${gradeClass}">${gradeLabel}</span>
          ${levelBadge}
        </div>
      </div>`;
  });
  grid.innerHTML = html;
}

// ══════════════════════════════════════════════
//  COUNTS
// ══════════════════════════════════════════════
function updateCounts() {
  document.getElementById('cnt-levelY').textContent = RAW_DATA.filter(d=>d.levelUp==='Y').length;
  document.getElementById('cnt-levelN').textContent = RAW_DATA.filter(d=>d.levelUp==='N').length;
  document.getElementById('cnt-grade1').textContent = RAW_DATA.filter(d=>d.expectedGrade===1).length;
  document.getElementById('cnt-grade2').textContent = RAW_DATA.filter(d=>d.expectedGrade===2).length;
  document.getElementById('cnt-grade3').textContent = RAW_DATA.filter(d=>d.expectedGrade===3).length;
  document.getElementById('cnt-all').textContent = RAW_DATA.length;
}

// ══════════════════════════════════════════════
//  TAB SWITCH
// ══════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  sortKey = 'score'; sortAsc = false;
  renderTable();
}

// ══════════════════════════════════════════════
//  FILTER DATA
// ══════════════════════════════════════════════
function getFilteredData() {
  switch(currentTab) {
    case 'levelY':  return RAW_DATA.filter(d => d.levelUp === 'Y');
    case 'levelN':  return RAW_DATA.filter(d => d.levelUp === 'N');
    case 'grade1':  return RAW_DATA.filter(d => d.expectedGrade === 1);
    case 'grade2':  return RAW_DATA.filter(d => d.expectedGrade === 2);
    case 'grade3':  return RAW_DATA.filter(d => d.expectedGrade === 3);
    default:        return [...RAW_DATA];
  }
}

// ══════════════════════════════════════════════
//  SORT
// ══════════════════════════════════════════════
function sortTable(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = false; }
  renderTable();
}

function getSortedData(data) {
  const keyMap = { storeName:'store', score:'score', grade:'expectedGrade', hs:'hs', wire:'wire', visit:'visit', nps:'nps', penalty:'penalty' };
  const field = keyMap[sortKey] || 'score';
  return [...data].sort((a,b) => {
    let va = a[field], vb = b[field];
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });
}

// ══════════════════════════════════════════════
//  GRADE ARROW (당월 vs 최근3개월)
// ══════════════════════════════════════════════
function gradeArrow(d) {
  const diff = d.recent3Grade - d.expectedGrade; // 양수 = 등급 상승(숫자 낮을수록 좋음)
  if (diff > 0) return '<span class="arrow-up" title="등급 상승">▲</span>';
  if (diff < 0) return '<span class="arrow-down" title="등급 하락">▼</span>';
  return '<span class="arrow-same" title="등급 유지">─</span>';
}

// ══════════════════════════════════════════════
//  SCORE COLOR
// ══════════════════════════════════════════════
function scoreColor(s) {
  if (s >= 80) return 'score-high';
  if (s >= 60) return 'score-mid';
  return 'score-low';
}

// ══════════════════════════════════════════════
//  RENDER TABLE
// ══════════════════════════════════════════════
function renderTable() {
  const filtered = getFilteredData();
  const sorted = getSortedData(filtered);
  const tbody = document.getElementById('tableBody');
  if (sorted.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" class="empty-msg">해당 조건의 매장이 없습니다.</td></tr>`;
    return;
  }
  let html = '';
  sorted.forEach((d, idx) => {
    const rank = idx + 1;
    let rankClass = '';
    let rankBadge = `<span class="rank-badge rank-badge-n">${rank}</span>`;
    if (rank === 1) { rankClass = 'rank-1'; rankBadge = `<span class="rank-badge rank-badge-1">1</span>`; }
    else if (rank === 2) { rankClass = 'rank-2'; rankBadge = `<span class="rank-badge rank-badge-2">2</span>`; }
    else if (rank === 3) { rankClass = 'rank-3'; rankBadge = `<span class="rank-badge rank-badge-3">3</span>`; }

    const arrow = gradeArrow(d);
    const gradeSpan = `<span class="grade-${d.expectedGrade}">${d.expectedGrade}등급</span>`;
    const levelSpan = d.levelUp === 'Y' ? '<span class="level-y">Y</span>' : '<span class="level-n">N</span>';
    const sc = scoreColor(d.score);

    html += `<tr class="${rankClass}">
      <td data-tooltip="대리점: ${d.agency} | 매장코드: ${d.code} | 최근3개월 종합: ${d.recent3Score.toFixed(2)} | 최근3개월 등급: ${d.recent3Grade}등급 | 레벨업: ${d.levelUp}">
        ${rankBadge}<strong>${d.store}</strong><br>
        <span style="font-size:0.72rem;color:#9E9E9E;font-weight:400;">${d.agency}</span>
      </td>
      <td class="score-cell ${sc}"
          data-tooltip="당월 종합점수 = H/S판매(${d.hs.toFixed(2)}) + 유선(${d.wire.toFixed(2)}) + 내방고객(${d.visit.toFixed(2)}) + NPS(${d.nps.toFixed(2)}) - 위반(${d.penalty})">
        ${d.score.toFixed(2)}
      </td>
      <td data-tooltip="당월 예상 등급: ${d.expectedGrade}등급 | 최근3개월 등급: ${d.recent3Grade}등급 | 레벨업 대상: ${d.levelUp}">
        ${gradeSpan} ${arrow} ${levelSpan}
      </td>
      <td>
        <button class="ai-btn" onclick="showAI('${d.store.replace(/'/g,"\\'")}')">🤖 AI 분석</button>
      </td>
      <td data-tooltip="H/S판매 원데이터: ${d.hs_raw}건 | MNP: ${d.mnp}건 (1.2배 가중치 적용)">
        ${d.hs.toFixed(2)}
      </td>
      <td data-tooltip="유선 원데이터: ${d.wire_raw}건">
        ${d.wire.toFixed(2)}
      </td>
      <td data-tooltip="내방고객 원데이터: ${d.visit_raw}명 | 타사단골: ${d.rival}명 (가점 포함)">
        ${d.visit.toFixed(2)}
      </td>
      <td data-tooltip="NPS 원데이터: ${d.nps_raw.toFixed(2)}%">
        ${d.nps.toFixed(2)}
      </td>
      <td data-tooltip="고객정보보호이행점검위반 건수: ${d.violation}건 (감점 적용)">
        <span style="color:${d.penalty < 0 ? '#E60012' : '#2E7D32'};font-weight:700;">${d.penalty}</span>
      </td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

// ══════════════════════════════════════════════
//  AI COMMENT
// ══════════════════════════════════════════════
function showAI(storeName) {
  const d = RAW_DATA.find(r => r.store === storeName);
  if (!d) return;
  document.getElementById('modalTitle').textContent = `🤖 AI 코멘트 — ${d.store}`;
  document.getElementById('modalContent').innerHTML = generateAIComment(d);
  document.getElementById('aiModal').classList.add('open');
}

function closeModal() {
  document.getElementById('aiModal').classList.remove('open');
}
document.getElementById('aiModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function generateAIComment(d) {
  const gradeLabel = ['', '1등급(최우수)', '2등급(우수)', '3등급(일반)'];
  const currentGrade = d.expectedGrade;
  const prevGrade = d.recent3Grade;
  const diff = prevGrade - currentGrade;

  // 각 항목 분석
  const hsRatio = d.hs / 40 * 100;
  const wireRatio = d.wire / 10 * 100;
  const visitRatio = d.visit / 32 * 100;
  const npsRatio = d.nps / 20 * 100;

  // 약점 분석
  const weakPoints = [];
  const strongPoints = [];

  if (hsRatio < 60) weakPoints.push({ name: 'H/S판매(MNP 포함)', val: d.hs.toFixed(2), max: 40, tip: `현재 ${d.hs_raw}건 판매 중. MNP ${d.mnp}건 포함. 목표 대비 ${(40-d.hs).toFixed(2)}점 부족.` });
  else strongPoints.push(`H/S판매 ${d.hs.toFixed(2)}점 (목표 대비 ${hsRatio.toFixed(0)}%)`);

  if (wireRatio < 60) weakPoints.push({ name: '유선', val: d.wire.toFixed(2), max: 10, tip: `현재 ${d.wire_raw}건. 목표 대비 ${(10-d.wire).toFixed(2)}점 부족.` });
  else strongPoints.push(`유선 ${d.wire.toFixed(2)}점 (목표 대비 ${wireRatio.toFixed(0)}%)`);

  if (visitRatio < 60) weakPoints.push({ name: '내방고객(타사단골)', val: d.visit.toFixed(2), max: 32, tip: `내방 ${d.visit_raw}명, 타사단골 ${d.rival}명. 목표 대비 ${(32-d.visit).toFixed(2)}점 부족.` });
  else strongPoints.push(`내방고객 ${d.visit.toFixed(2)}점 (목표 대비 ${visitRatio.toFixed(0)}%)`);

  if (npsRatio < 70) weakPoints.push({ name: 'NPS', val: d.nps.toFixed(2), max: 20, tip: `NPS ${d.nps_raw.toFixed(1)}%. 고객 만족도 향상 필요.` });
  else strongPoints.push(`NPS ${d.nps.toFixed(2)}점 (${d.nps_raw.toFixed(1)}%)`);

  // 등급 상향 조건
  let upgradeMsg = '';
  if (currentGrade === 1) {
    upgradeMsg = `<li>✅ 현재 <strong>1등급(최우수)</strong>을 유지 중입니다. 지속적인 성과 관리가 필요합니다.</li>`;
  } else if (currentGrade === 2) {
    const need = 80 - d.score;
    upgradeMsg = `<li>🎯 <strong>1등급 달성</strong>을 위해 약 <strong>${need > 0 ? need.toFixed(2) + '점'  : '이미 충족'}</strong> 추가 점수가 필요합니다.</li>
    <li>📌 H/S판매 강화(MNP 유치 집중), 유선 가입 확대, 내방고객 증대가 핵심입니다.</li>`;
  } else {
    const need2 = 60 - d.score;
    const need1 = 80 - d.score;
    upgradeMsg = `<li>🎯 <strong>2등급 달성</strong>을 위해 약 <strong>${need2 > 0 ? need2.toFixed(2) + '점' : '이미 충족'}</strong> 추가 점수가 필요합니다.</li>
    <li>🎯 <strong>1등급 달성</strong>을 위해 약 <strong>${need1 > 0 ? need1.toFixed(2) + '점' : '이미 충족'}</strong> 추가 점수가 필요합니다.</li>`;
  }

  // 레벨업 대상 메시지
  const levelMsg = d.levelUp === 'Y'
    ? `<li>⭐ <strong>레벨업 대상 매장</strong>입니다. 이번 달 집중 관리로 등급 상향 가능성이 높습니다!</li>`
    : `<li>ℹ️ 현재 레벨업 대상이 아닙니다. 꾸준한 성과 유지가 중요합니다.</li>`;

  // 등급 변화 메시지
  let trendMsg = '';
  if (diff > 0) trendMsg = `<li>📈 최근 3개월 ${prevGrade}등급 → 당월 예상 <strong>${currentGrade}등급</strong>으로 <span style="color:#E60012;font-weight:700;">등급 상승</span> 추세입니다!</li>`;
  else if (diff < 0) trendMsg = `<li>📉 최근 3개월 ${prevGrade}등급 → 당월 예상 <strong>${currentGrade}등급</strong>으로 <span style="color:#1565C0;font-weight:700;">등급 하락</span> 추세입니다. 즉각적인 개선이 필요합니다.</li>`;
  else trendMsg = `<li>📊 최근 3개월과 동일한 <strong>${currentGrade}등급</strong>을 유지 중입니다.</li>`;

  // 약점 항목 개선 제안
  let weakHtml = '';
  if (weakPoints.length > 0) {
    weakHtml = `<li>🔴 <strong>개선 필요 항목:</strong><ul style="margin-top:6px;">` +
      weakPoints.map(w => `<li><strong>${w.name}</strong>: ${w.val}점 / ${w.max}점 — ${w.tip}</li>`).join('') +
      `</ul></li>`;
  }

  let strongHtml = '';
  if (strongPoints.length > 0) {
    strongHtml = `<li>🟢 <strong>강점 항목:</strong> ${strongPoints.join(', ')}</li>`;
  }

  // MNP 특이사항
  let mnpMsg = '';
  if (d.mnp >= 10) mnpMsg = `<li>💡 MNP ${d.mnp}건으로 <strong>타사 전환 유치가 우수</strong>합니다. 지속 유지 권장.</li>`;
  else if (d.mnp < 3) mnpMsg = `<li>💡 MNP ${d.mnp}건으로 타사 전환 유치가 저조합니다. <strong>MNP 집중 캠페인</strong>을 권장합니다.</li>`;

  // 타사단골 메시지
  let rivalMsg = '';
  if (d.rival >= 10) rivalMsg = `<li>💡 타사단골 ${d.rival}명으로 <strong>경쟁사 고객 유입이 활발</strong>합니다.</li>`;
  else if (d.rival === 0) rivalMsg = `<li>💡 타사단골 0명입니다. <strong>경쟁사 고객 대상 프로모션</strong>을 강화하세요.</li>`;

  return `<ul>
    <li>📋 <strong>매장:</strong> ${d.store} (${d.agency}) | 당월 종합점수: <strong>${d.score.toFixed(2)}점</strong></li>
    <li>🏅 <strong>당월 예상 등급:</strong> <span class="grade-${currentGrade}">${gradeLabel[currentGrade]}</span></li>
    ${trendMsg}
    ${levelMsg}
    ${upgradeMsg}
    ${weakHtml}
    ${strongHtml}
    ${mnpMsg}
    ${rivalMsg}
    ${d.penalty < 0 ? `<li>⚠️ 고객정보보호 위반 감점(${d.penalty}점)이 발생했습니다. <strong>즉시 시정 조치</strong>가 필요합니다.</li>` : ''}
    <li>📌 <strong>종합 제언:</strong> ${getOverallAdvice(d)}</li>
  </ul>`;
}

function getOverallAdvice(d) {
  if (d.expectedGrade === 1) return `최우수 등급을 유지하고 있습니다. H/S판매와 내방고객 관리를 지속하며 NPS 고객 만족도를 높게 유지하세요.`;
  if (d.expectedGrade === 2 && d.recent3Grade === 1) return `이전 1등급에서 하락했습니다. H/S판매(MNP 포함) 강화와 유선 가입 확대에 집중하여 1등급 복귀를 목표로 하세요.`;
  if (d.expectedGrade === 2) return `2등급 유지 중입니다. MNP 유치 강화, 유선 가입 확대, 타사단골 고객 관리를 통해 1등급 진입을 노려보세요.`;
  if (d.levelUp === 'Y') return `레벨업 대상 매장입니다. H/S판매 집중, 내방고객 증대, NPS 관리를 통해 이번 달 등급 상향을 달성하세요!`;
  return `H/S판매 확대(MNP 유치 집중), 유선 가입 증대, 내방고객 및 타사단골 관리를 통해 단계적 등급 상향을 추진하세요.`;
}

// ══════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════
init();
</script>
